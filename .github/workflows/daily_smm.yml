name: Fincare Daily SMM Automation

on:
  # Runs every day at 8:00 AM UTC (adjust to your timezone)
  schedule:
    - cron: '0 8 * * 1-5'    # Daily SMM pipeline: Mon–Fri 8am UTC
    - cron: '0 9 * * 1-5'    # Performance stats check: Mon–Fri 9am UTC
    - cron: '0 7 * * 1'      # Competitor spy: Monday 7am UTC
    - cron: '0 10,14,18 * * 1-5'  # Comment reply bot: 3x daily weekdays

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (research + write only, no posting)'
        required: false
        default: 'false'

jobs:
  run-smm-pipeline:
    name: Research → Write → Approve → Post
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 hours max (covers 4h approval wait)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Run SMM pipeline
        working-directory: automation
        env:
          # All secrets stored in GitHub Secrets — never in code
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_ACCESS_TOKEN:      ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID:         ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_ORGANIZATION_ID:   ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          TIKTOK_ACCESS_TOKEN:        ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          THREADS_ACCESS_TOKEN:       ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:            ${{ secrets.THREADS_USER_ID }}
          APPROVAL_TIMEOUT_HOURS:     "4"
          TIMEZONE:                   "UTC"
        run: python src/main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smm-logs
          path: automation/logs/
          retention-days: 7

  # ── Skill 8: Performance Tracker — runs daily at 9am UTC ──
  check-performance:
    name: Fetch LinkedIn Stats + Weekly Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs 1 hour after the main job — picks up yesterday's post stats
    # Also sends Monday weekly performance report
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Run stats check
        working-directory: automation
        env:
          LINKEDIN_ACCESS_TOKEN:    ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "import sys; sys.path.insert(0,'.'); from src.performance_tracker import run_stats_check; run_stats_check()"

  # ── Skill 5: Competitor Spy — runs every Monday at 7am UTC ──
  competitor-spy:
    name: Weekly Competitor Intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Run competitor spy
        working-directory: automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "import sys; sys.path.insert(0,'.'); from src.competitor_spy import run_competitor_spy; run_competitor_spy()"

  # ── Skill 12: Comment Reply Bot — runs 3x daily weekdays ──
  comment-reply-bot:
    name: LinkedIn Comment Reply Bot
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Run comment reply bot
        working-directory: automation
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN:    ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_ID: ${{ secrets.LINKEDIN_ORGANIZATION_ID }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "import sys; sys.path.insert(0,'.'); from src.comment_reply_bot import run_comment_reply_bot; run_comment_reply_bot()"
